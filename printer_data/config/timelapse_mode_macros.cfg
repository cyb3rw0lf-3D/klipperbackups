[gcode_macro TIMELAPSE_MODE_HYPERLAPSE]
description: Switch timelapse capture to time-based hyperlapse mode (continuous, no per-layer park)
gcode:
    {action_call_remote_method("timelapse_setmode", mode="hyperlapse")}
    RESPOND MSG="Timelapse: hyperlapse mode (time-based)"

[gcode_macro TIMELAPSE_MODE_LAYERMACRO]
description: Switch timelapse capture to per-layer mode (parks head and shoots on every layer change)
gcode:
    {action_call_remote_method("timelapse_setmode", mode="layermacro")}
    RESPOND MSG="Timelapse: layermacro mode (per-layer)"
