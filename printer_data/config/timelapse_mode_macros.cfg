[gcode_macro TIMELAPSE_MODE_HYPERLAPSE]
description: Switch timelapse capture to time-based hyperlapse mode (parked, clean shots)
gcode:
    {action_call_remote_method("timelapse_setmode", mode="hyperlapse", parkhead=True, fw_retract=True)}
    RESPOND MSG="Timelapse: hyperlapse mode (time-based, parked)"

[gcode_macro TIMELAPSE_MODE_LAYERMACRO]
description: Switch timelapse capture to per-layer mode (parks head and shoots on every layer change)
gcode:
    {action_call_remote_method("timelapse_setmode", mode="layermacro", parkhead=True, fw_retract=True)}
    RESPOND MSG="Timelapse: layermacro mode (per-layer, parked)"

[gcode_macro TIMELAPSE_MODE_PHONE]
description: Switch timelapse capture to a continuous, uninterrupted phone-style timelapse (no parking)
gcode:
    {action_call_remote_method("timelapse_setmode", mode="hyperlapse", parkhead=False, fw_retract=False)}
    RESPOND MSG="Timelapse: phone-style mode (time-based, no parking)"
