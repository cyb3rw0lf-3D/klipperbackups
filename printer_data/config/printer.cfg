# Elegoo Neptune 3 Pro (ZNP Robin Nano_DW V2.2 / STM32F401) - optimized config
# Pin mappings verified against Klipper3d/klipper's official
# printer-elegoo-neptune3-pro-2023.cfg and cross-checked against
# TheFeralEngineer's community Neptune 3 Pro config.
#
# Things flagged "TUNE THIS" below are placeholders that only make sense
# once measured on your actual machine/filament - they're not guessed
# numbers, they're the exact command to run to get a real value.

[include KAMP_Settings.cfg]
[include timelapse.cfg]
[include timelapse_mode_macros.cfg]

[respond]

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 15
max_z_accel: 350
square_corner_velocity: 5

# ============================= Steppers =============================

[stepper_x]
step_pin: PC12
dir_pin: PB3
enable_pin: !PD2
microsteps: 16
rotation_distance: 40
endstop_pin: PA13
position_min: -5
position_endstop: -5
position_max: 235
homing_speed: 50

[stepper_y]
step_pin: PC11
dir_pin: PA15
enable_pin: !PC10
microsteps: 16
rotation_distance: 40
endstop_pin: PB8
position_endstop: 0
position_max: 234
homing_speed: 50

[stepper_z]
step_pin: PC7
dir_pin: !PC9
enable_pin: !PC8
microsteps: 16
rotation_distance: 8
position_min: -5
endstop_pin: probe:z_virtual_endstop
position_max: 283
homing_speed: 8

# This board does not expose TMC UART to Klipper - driver current and
# microstep interpolation are fixed by onboard hardware (jumpers/pots),
# not configurable here.

# =============================== Probe ===============================

[probe]
pin: ^PA8
x_offset: -28.5
y_offset: 22
speed: 5
lift_speed: 15
samples: 1
# TUNE THIS: run PROBE_CALIBRATE, then TESTZ Z=-/+ until a piece of paper
# just drags under the nozzle at Z=0, then SAVE_CONFIG.
#z_offset: 0

[safe_z_home]
home_xy_position: 117.5, 117.5
z_hop: 10

[bed_mesh]
mesh_min: 30, 30
mesh_max: 205, 205
probe_count: 6, 6
algorithm: bicubic
speed: 150
fade_start: 1
fade_end: 10
fade_target: 0

# ============================== Extruder ==============================

[extruder]
step_pin: PB10
dir_pin: PB1
enable_pin: !PC6
microsteps: 16
# TUNE THIS: this is the official reference value for this board's stock
# extruder gearing. Verify with the rotation_distance calibration guide:
# https://www.klipper3d.org/Rotation_Distance.html#calibrating-rotation_distance-on-extruders
rotation_distance: 8.42
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA6
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC1
min_temp: 0
max_temp: 260
max_extrude_only_distance: 100
# KAMP's LINE_PURGE requires >=5; Klipper's own default for a 0.4mm nozzle
# (4 * nozzle_diameter^2 = 0.64) is well under that.
max_extrude_cross_section: 5
#control: pid
# Starting point (official reference values, PETG @ 240C). TUNE THIS for
# your actual filament/temp: PID_CALIBRATE HEATER=extruder TARGET=<your temp>
#pid_Kp: 26.27
#pid_Ki: 1.607
#pid_Kd: 107.380
# TUNE THIS: run the pressure advance test tower for your filament/hotend:
# https://www.klipper3d.org/Pressure_Advance.html
#pressure_advance: 0.04

[firmware_retraction]
# TUNE THIS: starting point for a direct-drive extruder. Increase retract_length
# if you see oozing/stringing, decrease if you see gaps at retract/unretract.
retract_length: 0.6
retract_speed: 40
unretract_extra_length: 0
unretract_speed: 40

# ============================== Heated bed ==============================

[heater_bed]
heater_pin: PA5
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC0
min_temp: 0
max_temp: 100
pwm_cycle_time: 0.020
#control: pid
# Starting point (official reference values, PETG @ 80C bed). TUNE THIS:
# PID_CALIBRATE HEATER=heater_bed TARGET=<your temp>
#pid_Kp: 70.173
#pid_Ki: 1.418
#pid_Kd: 868.388

# ================================ Cooling ================================

[fan]
pin: PA7

[heater_fan hotend_fan]
pin: PB0
heater: extruder
heater_temp: 50.0

# =================================== Misc ===================================

[led top_LEDs]
white_pin: PB9
cycle_time: 0.005
initial_WHITE: 1

# Fires once ~1s after Klipper finishes connecting to the MCU, so the
# lights come on as soon as the printer is hooked up - not tied to a print.
[delayed_gcode LIGHTS_ON_AT_STARTUP]
initial_duration: 1
gcode:
    SET_LED LED=top_LEDs WHITE=1

[filament_switch_sensor filament_runout_sensor]
switch_pin: PB4
pause_on_runout: true

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu

[exclude_object]

[virtual_sdcard]
path: ~/printer_data/gcodes

[pause_resume]

[display_status]

[force_move]
enable_force_move: True

# Approximate starting values sourced from other Neptune 3 Pro (stock frame)
# owners' measured results, NOT measured on this specific machine. Real
# values require an accelerometer + SHAPER_CALIBRATE - see the ADXL345
# section of the calibration checklist for how to add one.
[input_shaper]
shaper_type_x: ei
shaper_freq_x: 79.6
shaper_type_y: mzv
shaper_freq_y: 38.2

# ============================== Macros ==============================

[gcode_macro PRINT_START]
description: Standard print start - home, adaptive mesh (KAMP), park+soak, adaptive Voron-logo purge (KAMP)
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}
    M104 S{EXTRUDER_TEMP * 0.9}
    M140 S{BED_TEMP}
    G28
    M190 S{BED_TEMP}
    BED_MESH_CALIBRATE
    SMART_PARK
    M109 S{EXTRUDER_TEMP}
    VORON_PURGE

[gcode_macro PRINT_END]
description: Standard print end - retract, park, cool down
gcode:
    M400
    G91
    G1 E-2 F2700
    G1 E-2 Z0.2 F2400
    G90
    G1 X2 Y2 F6000
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set cur_z = printer.toolhead.position.z|float %}
    {% set z_park = [cur_z + 20, max_z]|min %}
    G1 Z{z_park} F600
    M104 S0
    M140 S0
    M106 S0
    M107
    M84 X Y E

[gcode_macro PAUSE]
description: Pause the running print
rename_existing: PAUSE_BASE
variable_extrude: 1.0
gcode:
    {% set E = printer["gcode_macro PAUSE"].extrude|float %}
    {% set x_park = printer.toolhead.axis_maximum.x|float - 5.0 %}
    {% set y_park = printer.toolhead.axis_maximum.y|float - 5.0 %}
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}
    {% if act_z < (max_z - 2.0) %}
        {% set z_safe = 2.0 %}
    {% else %}
        {% set z_safe = max_z - act_z %}
    {% endif %}
    PAUSE_BASE
    G91
    {% if printer.extruder.can_extrude|lower == 'true' %}
        G1 E-{E} F2100
    {% else %}
        {action_respond_info("Extruder not hot enough")}
    {% endif %}
    {% if "xyz" in printer.toolhead.homed_axes %}
        G1 Z{z_safe} F900
        G90
        G1 X{x_park} Y{y_park} F6000
    {% else %}
        {action_respond_info("Printer not homed")}
    {% endif %}

[gcode_macro RESUME]
description: Resume the paused print
rename_existing: RESUME_BASE
gcode:
    {% set E = printer["gcode_macro PAUSE"].extrude|float %}
    {% if 'VELOCITY' in params|upper %}
        {% set get_params = ('VELOCITY=' + params.VELOCITY) %}
    {% else %}
        {% set get_params = "" %}
    {% endif %}
    {% if printer.extruder.can_extrude|lower == 'true' %}
        G91
        G1 E{E} F2100
        G90
    {% else %}
        {action_respond_info("Extruder not hot enough")}
    {% endif %}
    RESUME_BASE {get_params}

[gcode_macro CANCEL_PRINT]
description: Cancel the running print
rename_existing: CANCEL_PRINT_BASE
gcode:
    TURN_OFF_HEATERS
    CANCEL_PRINT_BASE

